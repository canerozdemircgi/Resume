		<text-entry-right br='0.75em' text='Supporting junior engineers by guiding pair programming sessions, promoting practical workflow improvements.' mark='>'></text-entry-right>
		<text-entry-right br='0.75em' text='Converted speed critical <u-n>API</u-n> method calls into <u-n>C++</u-n> and <u-n>JNI</u-n> equivalents, improved response time up to 50%.' mark='+'></text-entry-right>
		<text-entry-right br='0' text='Performed an encryptor integrated in <u-n>Jenkins</u-n> and a real time decryptor using <u-n>OpenSSL C</u-n> library for <u-n>OSGI</u-n> middleware class loaders in order to complicate decompiling of files.' mark='+'></text-entry-right>
